DEFAULT:
  file_cfg:
    repo_id: mobilint/YOLO26l-seg
    filename: yolo26l-seg.mxq
    revision: main
  pre_cfg:
    Reader:
      style: numpy
    LetterBox:
      img_size:
      - 640
      - 640
    SetOrder:
      shape: HWC
    Normalize:
      style: cv
  post_cfg:
    task: instance_segmentation
    nl: 3
    n_extra: 32
    dflfree: true
    conf_thres: 0.001
    iou_thres: 0.7
TURBO:
  update: DEFAULT
  file_cfg:
    revision: TURBO
