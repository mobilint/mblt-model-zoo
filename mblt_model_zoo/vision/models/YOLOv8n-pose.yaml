DEFAULT:
  file_cfg:
    repo_id: mobilint/YOLOv8n-pose
    filename: yolov8n-pose.mxq
    revision: main
  pre_cfg:
    Reader:
      style: numpy
    LetterBox:
      img_size:
      - 640
      - 640
    SetOrder:
      shape: HWC
    Normalize:
      style: cv
  post_cfg:
    task: pose_estimation
    nl: 3
    n_extra: 51
    reg_max: 16
    conf_thres: 0.001
    iou_thres: 0.7
TURBO:
  update: DEFAULT
  file_cfg:
    revision: TURBO
