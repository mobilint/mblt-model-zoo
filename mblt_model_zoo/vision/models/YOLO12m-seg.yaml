DEFAULT:
  file_cfg:
    repo_id: mobilint/YOLO12m-seg
    filename: yolo12m-seg.mxq
    revision: main
  pre_cfg:
    Reader:
      style: numpy
    LetterBox:
      img_size:
      - 640
      - 640
    SetOrder:
      shape: HWC
    Normalize:
      style: cv
  post_cfg:
    task: instance_segmentation
    nc: 80
    nl: 3
    n_extra: 32
    reg_max: 16
    conf_thres: 0.7
    iou_thres: 0.001
TURBO:
  update: DEFAULT
  file_cfg:
    revision: TURBO
