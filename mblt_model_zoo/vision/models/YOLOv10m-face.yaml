DEFAULT:
  file_cfg:
    repo_id: mobilint/YOLOv10m-face
    filename: yolov10m-face.mxq
    revision: main
  pre_cfg:
    Reader:
      style: numpy
    LetterBox:
      img_size:
      - 640
      - 640
    SetOrder:
      shape: HWC
    Normalize:
      style: cv
  post_cfg:
    task: face_detection
    dataset: widerface
    nl: 3
    nmsfree: true
    reg_max: 16
    conf_thres: 0.001
    iou_thres: 0.7
TURBO:
  update: DEFAULT
  file_cfg:
    revision: TURBO
